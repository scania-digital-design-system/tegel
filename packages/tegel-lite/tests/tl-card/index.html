

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Tegel Lite - Card</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    
    <link rel="stylesheet" href="../../dist/scania-variables.css" />
    <link rel="stylesheet" href="../../dist/traton-variables.css" />
    <link rel="stylesheet" href="../../dist/global.css" />
    <link rel="stylesheet" href="../../dist/tl-card.css" />
    <link rel="stylesheet" href="../../dist/tl-icon.css" />
    <link rel="stylesheet" href="../../dist/tl-button.css" />
  </head>

  <body>
    <div class="demo-wrapper ">

      <!-- primary -->
      <div class="variant-wrapper">

        <div
        class="tl-card tl-card--primary tl-card--image-above-header tl-card--stretch tl-card--expandable tl-card--expanded"
      >
        <div class="tl-card__body">
          <img
            class="tl-card__image"
            src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'600'%20height%3D'300'%3E%0A%20%20%20%20%3Crect%20width%3D'100%25'%20height%3D'100%25'%20fill%3D'%23F2F2F2'%2F%3E%0A%20%20%20%20%3Ctext%20x%3D'50%25'%20y%3D'50%25'%20dominant-baseline%3D'middle'%20text-anchor%3D'middle'%20font-size%3D'14'%20fill%3D'%23999'%3E%3C%2Ftext%3E%0A%20%20%3C%2Fsvg%3E"
            alt="Card picture"
          />
          <div class="tl-card__header">
            <img
              class="tl-card__thumbnail"
              src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'40'%20height%3D'40'%3E%0A%20%20%20%20%3Crect%20width%3D'40'%20height%3D'40'%20fill%3D'%23E6E6E6'%2F%3E%0A%20%20%20%20%3Ctext%20x%3D'50%25'%20y%3D'50%25'%20dominant-baseline%3D'middle'%20text-anchor%3D'middle'%20font-size%3D'10'%20fill%3D'%23999'%3E%3C%2Ftext%3E%0A%20%20%3C%2Fsvg%3E"
              alt="Card thumbnail"
            />
            <div class="tl-card__headings">
              <div class="tl-card__title">Header text</div>
              <div class="tl-card__subtitle">Subheader text</div>
            </div>
            <button
              class="tl-button tl-button--only-icon tl-button--ghost tl-button--sm tl-button--icon"
            >
              <span class="tl-icon tl-icon--chevron_down tl-icon--16"></span>
            </button>
          </div>
    
          <div class="tl-card__content">
            Lorem ipsum dummy text for printing; standard filler ever since 1500s
          </div>
        </div>
        <div class="tl-card__bottom-row">
          <div class="tl-card__actions" style="gap: 16px;">
            <button class="tl-button tl-button--primary tl-button--md">Button text</button>
            <button class="tl-button tl-button--secondary tl-button--md">Button text</button>
          </div>
          <span class="tl-icon tl-icon--placeholder tl-icon--20"></span>
        </div>
      </div>

      </div>

      <!-- Secondary -->
      <div class="variant-wrapper">
      
        <div
        class="tl-card tl-card--secondary tl-card--image-above-header tl-card--stretch tl-card--expandable tl-card--expanded"
      >
        <div class="tl-card__body">
          <img
            class="tl-card__image"
            src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'600'%20height%3D'300'%3E%0A%20%20%20%20%3Crect%20width%3D'100%25'%20height%3D'100%25'%20fill%3D'%23F2F2F2'%2F%3E%0A%20%20%20%20%3Ctext%20x%3D'50%25'%20y%3D'50%25'%20dominant-baseline%3D'middle'%20text-anchor%3D'middle'%20font-size%3D'14'%20fill%3D'%23999'%3E%3C%2Ftext%3E%0A%20%20%3C%2Fsvg%3E"
            alt="Card image"
          />
          <div class="tl-card__header">
            <img
              class="tl-card__thumbnail"
              src="data:image/svg+xml;utf8,%3Csvg%20xmlns%3D'http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg'%20width%3D'40'%20height%3D'40'%3E%0A%20%20%20%20%3Crect%20width%3D'40'%20height%3D'40'%20fill%3D'%23E6E6E6'%2F%3E%0A%20%20%20%20%3Ctext%20x%3D'50%25'%20y%3D'50%25'%20dominant-baseline%3D'middle'%20text-anchor%3D'middle'%20font-size%3D'10'%20fill%3D'%23999'%3E%3C%2Ftext%3E%0A%20%20%3C%2Fsvg%3E"
              alt="Card thumbnail"
            />
            <div class="tl-card__headings">
              <div class="tl-card__title">Header text</div>
              <div class="tl-card__subtitle">Subheader text</div>
            </div>
            <button
              class="tl-button tl-button--only-icon tl-button--ghost tl-button--sm tl-button--icon"
            >
              <span class="tl-icon tl-icon--chevron_down tl-icon--16"></span>
            </button>
          </div>
    
          <div class="tl-card__content">
            Lorem ipsum dummy text for printing; standard filler ever since 1500s
          </div>
        </div>
        <div class="tl-card__bottom-row">
          <div class="tl-card__actions" style="gap: 16px;">
            <button class="tl-button tl-button--primary tl-button--md">Button text</button>
            <button class="tl-button tl-button--secondary tl-button--md">Button text</button>
          </div>
          <span class="tl-icon tl-icon--placeholder tl-icon--20"></span>
        </div>
      </div>

      </div> 
    
    </div>
  </body>
  <style>
      .tds-mode-dark {
        /* tds-grey-900 */
        background-color: #15181d;
      }

      .variant-wrapper {
        display: flex;
        width: 380px;
        flex-direction: column;
        gap: 12px;
      }

      .demo-wrapper {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }
  </style>
</html>
