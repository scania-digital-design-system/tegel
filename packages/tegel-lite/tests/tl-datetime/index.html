

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Tegel Lite - Datetime</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    
    <link rel="stylesheet" href="../../dist/scania-variables.css" />
    <link rel="stylesheet" href="../../dist/traton-variables.css" />
    <link rel="stylesheet" href="../../dist/global.css" />
    <link rel="stylesheet" href="../../dist/tl-datetime.css" />
  </head>

  <body>
    <div class="demo-wrapper ">

      <!-- primary -->
      <div class="variant-wrapper">

        <div
        class="tl-datetime tl-datetime--primary tl-datetime--lg tl-datetime--label-outside"
        style="width: calc(100vw - 40px); max-width: 400px;"
        >
            <label class="tl-datetime__label">Label text</label>
            <div class="tl-datetime__wrapper">
                <input class="tl-datetime__input" type="datetime-local" />
            </div>
            <div class="tl-datetime__helper">Helper text</div>
        </div>

        <div
        class="tl-datetime tl-datetime--primary tl-datetime--md tl-datetime--success tl-datetime--label-inside"
        style="width: calc(100vw - 40px); max-width: 400px;"
        >
            <div class="tl-datetime__wrapper">
                <input class="tl-datetime__input" type="week" />
                <label class="tl-datetime__label-inside">Label text</label>
            </div>
            <div class="tl-datetime__helper">Helper text</div>
        </div>

        <div
        class="tl-datetime tl-datetime--primary tl-datetime--sm tl-datetime--error"
        style="width: calc(100vw - 40px); max-width: 400px;"
        >
            <div class="tl-datetime__wrapper">
                <input class="tl-datetime__input" type="time" />
            </div>
            <div class="tl-datetime__helper">Helper text</div>
        </div>

        <div
        class="tl-datetime tl-datetime--primary tl-datetime--md tl-datetime--label-outside"
        style="width: calc(100vw - 40px); max-width: 400px;"
        >
            <label class="tl-datetime__label">Label text</label>
            <div class="tl-datetime__wrapper">
                <input class="tl-datetime__input" type="time" disabled />
            </div>
            <div class="tl-datetime__helper">Helper text</div>
        </div>

      </div>

      <!-- Secondary -->
      <div class="variant-wrapper">
      
        <div
        class="tl-datetime tl-datetime--secondary tl-datetime--lg tl-datetime--label-outside"
        style="width: calc(100vw - 40px); max-width: 400px;"
        >
            <label class="tl-datetime__label">Label text</label>
            <div class="tl-datetime__wrapper">
                <input class="tl-datetime__input" type="datetime-local" />
            </div>
            <div class="tl-datetime__helper">Helper text</div>
        </div>

        <div
        class="tl-datetime tl-datetime--secondary tl-datetime--md tl-datetime--success tl-datetime--no-min-width tl-datetime--label-inside"
        style="width: calc(100vw - 40px); max-width: 400px;"
        >
            <div class="tl-datetime__wrapper">
                <input class="tl-datetime__input" type="week" />
                <label class="tl-datetime__label-inside">Label text</label>
            </div>
            <div class="tl-datetime__helper">Helper text</div>
        </div>

        <div
        class="tl-datetime tl-datetime--secondary tl-datetime--sm tl-datetime--error tl-datetime--no-min-width"
        style="width: calc(100vw - 40px); max-width: 400px;"
        >
            <div class="tl-datetime__wrapper">
                <input class="tl-datetime__input" type="time" />
            </div>
            <div class="tl-datetime__helper">Helper text</div>
        </div>

        <div
        class="tl-datetime tl-datetime--secondary tl-datetime--md tl-datetime--success tl-datetime--label-outside"
        style="width: calc(100vw - 40px); max-width: 400px;"
        >
            <label class="tl-datetime__label">Label text</label>
            <div class="tl-datetime__wrapper">
                <input class="tl-datetime__input" type="time" disabled />
            </div>
            <div class="tl-datetime__helper">Helper text</div>
        </div>

      </div> 
    
    </div>
  </body>
  <style>
      .tds-mode-dark {
        /* tds-grey-900 */
        background-color: #15181d;
      }

      .variant-wrapper {
        display: flex;
        width: 380px;
        flex-direction: column;
        gap: 12px;
      }

      .demo-wrapper {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }
  </style>
</html>
