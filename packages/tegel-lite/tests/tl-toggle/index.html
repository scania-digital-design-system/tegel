

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Tegel Lite - Toggle</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />

    <link rel="stylesheet" href="../../dist/scania-variables.css" />
    <link rel="stylesheet" href="../../dist/traton-variables.css" />
    <link rel="stylesheet" href="../../dist/global.css" />
    <link rel="stylesheet" href="../../dist/tl-toggle.css" />
  </head>

  <body style="height: 100vh;">
    <div class="demo-wrapper ">

      <div class="variant-wrapper">

        <div class="tl-toggle">
          <div class="tl-toggle__headline">Headline</div>
          <input type="checkbox" class="tl-toggle__input tl-toggle__input--lg" id="tl-toggle-1" />
          <label class="tl-toggle__label" for="tl-toggle-1">Label</label>
        </div>

        <div class="tl-toggle">
          <div class="tl-toggle__headline">Headline</div>
          <input type="checkbox" class="tl-toggle__input tl-toggle__input--lg" id="tl-toggle-2" checked />
          <label class="tl-toggle__label" for="tl-toggle-2">Label</label>
        </div>

        <div class="tl-toggle">
          <div class="tl-toggle__headline">Headline</div>
          <input type="checkbox" class="tl-toggle__input tl-toggle__input--sm" id="tl-toggle-3" checked />
          <label class="tl-toggle__label" for="tl-toggle-3">Label</label>
        </div>

        <div class="tl-toggle">
          <div class="tl-toggle__headline">Headline</div>
          <input type="checkbox" class="tl-toggle__input tl-toggle__input--lg" id="tl-toggle-4" disabled />
          <label class="tl-toggle__label" for="tl-toggle-4">Label</label>
        </div>

      </div>

    </div>
  </body>
  <style>
      .tl-mode-dark {
        /* tds-grey-900 */
        background-color: #15181d;
      }

      .variant-wrapper {
        display: flex;
        width: 380px;
        flex-direction: column;
        gap: 12px;
      }

      .demo-wrapper {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }
  </style>
</html>
