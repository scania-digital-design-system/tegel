

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Tegel Lite - Checkbox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    
    <link rel="stylesheet" href="../../dist/scania-variables.css" />
    <link rel="stylesheet" href="../../dist/traton-variables.css" />
    <link rel="stylesheet" href="../../dist/global.css" />
    <link rel="stylesheet" href="../../dist/tl-checkbox.css" />
  </head>

  <body style="height: 100vh;">
    <div class="demo-wrapper ">

        <div class="tl-checkbox">
            <input type="checkbox" class="tl-checkbox__input" id="tl-checkbox" />
            <label class="tl-checkbox__label" for="tl-checkbox">Label</label>
        </div>

        <div class="tl-checkbox">
            <input type="checkbox" class="tl-checkbox__input" id="tl-checkbox" checked />
            <label class="tl-checkbox__label" for="tl-checkbox">Label</label>
        </div>

        <div class="tl-checkbox">
            <input
              type="checkbox"
              class="tl-checkbox__input tl-checkbox__input--indeterminate"
              id="tl-checkbox"
            />
            <label class="tl-checkbox__label" for="tl-checkbox">Label</label>
        </div>

        <div class="tl-checkbox">
            <input type="checkbox" class="tl-checkbox__input" id="tl-checkbox" disabled checked />
            <label class="tl-checkbox__label" for="tl-checkbox">Label</label>
        </div>
    
    </div>
  </body>
  <style>
   

      .variant-wrapper {
        display: flex;
        width: 380px;
        flex-direction: column;
        gap: 12px;
      }

      .demo-wrapper {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }
  </style>
</html>
