

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Tegel Lite - Banner</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    
    <link rel="stylesheet" href="../../dist/scania-variables.css" />
    <link rel="stylesheet" href="../../dist/traton-variables.css" />
    <link rel="stylesheet" href="../../dist/global.css" />
    <link rel="stylesheet" href="../../dist/tl-banner.css" />
    <link rel="stylesheet" href="../../dist/tl-icon.css" />
    <link rel="stylesheet" href="../../dist/tl-link.css" />
  </head>

  <body style="height: 100vh;">
    <div class="demo-wrapper ">

        <div class="tl-banner">
            <span class="tl-banner__icon">
              <span class="tl-icon tl-icon--placeholder tl-icon--20" aria-hidden="true"></span>
            </span>
            <div class="tl-banner__content">
              <div class="tl-banner__text">
                <div class="tl-banner__header">This is a banner</div>
                <div class="tl-banner__subheader">This is a subheader</div>
              </div>
              <div class="tl-banner__actions">
                <a class="tl-link tl-link--underline" href="/">Link example</a>
              </div>
            </div>
            <div class="tl-banner__close">
              <span class="tl-icon tl-icon--cross tl-icon--20" aria-hidden="true"></span>
            </div>
          </div>

          <div class="tl-banner tl-banner--error">
            <span class="tl-banner__icon">
              <span class="tl-icon tl-icon--error tl-icon--20" aria-hidden="true"></span>
            </span>
            <div class="tl-banner__content">
              <div class="tl-banner__text">
                <div class="tl-banner__header">This is a banner</div>
                <div class="tl-banner__subheader">This is a subheader</div>
              </div>
              <div class="tl-banner__actions">
                <a class="tl-link tl-link--underline" href="/">Link example</a>
              </div>
            </div>
            <div class="tl-banner__close">
              <span class="tl-icon tl-icon--cross tl-icon--20" aria-hidden="true"></span>
            </div>
          </div>

          <div class="tl-banner tl-banner--information">
            <span class="tl-banner__icon">
              <span class="tl-icon tl-icon--info tl-icon--20" aria-hidden="true"></span>
            </span>
            <div class="tl-banner__content">
              <div class="tl-banner__text">
                <div class="tl-banner__header">This is a banner</div>
                <div class="tl-banner__subheader">This is a subheader</div>
              </div>
              <div class="tl-banner__actions">
                <a class="tl-link tl-link--underline" href="/">Link example</a>
              </div>
            </div>
            <div class="tl-banner__close">
              <span class="tl-icon tl-icon--cross tl-icon--20" aria-hidden="true"></span>
            </div>
          </div>
    
    </div>
  </body>
  <style>
      .tds-mode-dark {
        /* tds-grey-900 */
        background-color: #15181d;
      }

      .variant-wrapper {
        display: flex;
        width: 380px;
        flex-direction: column;
        gap: 12px;
      }

      .demo-wrapper {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }
  </style>
</html>
