

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Tegel Lite - Button</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    
    <link rel="stylesheet" href="../../dist/scania-variables.css" />
    <link rel="stylesheet" href="../../dist/traton-variables.css" />
    <link rel="stylesheet" href="../../dist/global.css" />
    <link rel="stylesheet" href="../../dist/tl-button.css" />
    <link rel="stylesheet" href="../../dist/tl-icon.css" />
  </head>

  <body>
    <div class="demo-wrapper ">

        <button class="tl-button tl-button--primary tl-button--lg">Button</button>
        <button class="tl-button tl-button--secondary tl-button--md">Button</button>
        <button class="tl-button tl-button--ghost tl-button--sm">Button</button>
        <button class="tl-button tl-button--danger tl-button--xs">Button</button>

        <button class="tl-button tl-button--primary tl-button--md tl-button--icon">
            Button
            <span class="tl-icon tl-icon--arrow_right tl-icon--20" aria-hidden="true"></span>
        </button>
        <br />
        <button class="tl-button tl-button--only-icon tl-button--primary tl-button--md tl-button--icon">
            <span class="tl-icon tl-icon--arrow_right tl-icon--20" aria-hidden="true"></span>
        </button>
        <br />
        <button class="tl-button tl-button--primary tl-button--md" disabled>Button</button>
        <br />
        <button class="tl-button tl-button--primary tl-button--md tl-button--full-width">Button</button>
    </div>
  </body>
  <style>
      .tds-mode-dark {
        /* tds-grey-900 */
        background-color: #15181d;
      }

      .variant-wrapper {
        display: flex;
        width: 380px;
        flex-direction: column;
        gap: 12px;
      }

      .demo-wrapper {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }
  </style>
</html>
