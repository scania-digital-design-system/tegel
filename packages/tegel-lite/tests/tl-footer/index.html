

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Tegel Lite - Footer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />

    <link rel="stylesheet" href="../../dist/scania-variables.css" />

  </head>

  <body style="height: 100vh;">
    <div class="demo-wrapper ">

      <footer class="tl-footer tl-footer--primary">
        <div class="tl-footer__top">
          <div class="tl-footer__group" role="list">
            <button class="tl-footer__top-title" type="button">Title 1</button>
            <a href="#" class="tl-footer__link">Link text</a>
            <a href="#" class="tl-footer__link">Link text</a>
            <a href="#" class="tl-footer__link">Link text</a>
          </div>
          <div class="tl-footer__group" role="list">
            <button class="tl-footer__top-title" type="button">Title 2</button>
            <a href="#" class="tl-footer__link">Link text</a>
            <a href="#" class="tl-footer__link">Link text</a>
            <a href="#" class="tl-footer__link">Link text</a>
          </div>
          <div class="tl-footer__group" role="list">
            <button class="tl-footer__top-title" type="button">Title 3</button>
            <a href="#" class="tl-footer__link">Link text</a>
            <a href="#" class="tl-footer__link">Link text</a>
            <a href="#" class="tl-footer__link">Link text</a>
          </div>
          <div class="tl-footer__group" role="list">
            <button class="tl-footer__top-title" type="button">Title 4</button>
            <a href="#" class="tl-footer__link">Link text</a>
            <a href="#" class="tl-footer__link">Link text</a>
            <a href="#" class="tl-footer__link">Link text</a>
          </div>
        </div>

        <div class="tl-footer__main">
          <div class="tl-footer__main-top">
            <div class="tl-footer__main-top--start">
              <div class="tl-footer__group" role="list">
                <a href="#" class="tl-footer__link">Link text</a>
                <a href="#" class="tl-footer__link">Link text</a>
                <a href="#" class="tl-footer__link">Link text</a>
                <a href="#" class="tl-footer__link">Link text</a>
              </div>
            </div>
            <div class="tl-footer__main-top--end">
              <div class="tl-footer__group" role="list">
                <a href="#" class="tl-footer__link"><span class="tl-icon tl-icon--truck tl-icon--16" svg-title="Truck"></span></a>
                <a href="#" class="tl-footer__link"><span class="tl-icon tl-icon--truck tl-icon--16" svg-title="Truck"></span></a>

            <small class="tl-footer__copyright">© Copyright 2026 All rights reserved.</small>
            <p class="tl-footer__brand">Scania</p>
          </div>
        </div>
      </footer>

    </div>
  </body>
  <style>
      .tl-mode-dark {
        /* tds-grey-900 */
        background-color: #15181d;
      }

      .demo-wrapper {
        display: flex;
        flex-direction: column;
      }
