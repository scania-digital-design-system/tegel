

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <title>Tegel Lite - Toast</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />

    <link rel="stylesheet" href="../../dist/scania-variables.css" />
    <link rel="stylesheet" href="../../dist/traton-variables.css" />
    <link rel="stylesheet" href="../../dist/global.css" />
    <link rel="stylesheet" href="../../dist/tl-toast.css" />
    <link rel="stylesheet" href="../../dist/tl-icon.css" />
    <link rel="stylesheet" href="../../dist/tl-link.css" />
  </head>

  <body style="height: 100vh;">
    <div class="demo-wrapper ">

      <div class="variant-wrapper">

        <div class="tl-toast tl-toast--information">
          <span class="tl-toast__icon"><span class="tl-icon tl-icon--info tl-icon--20" aria-hidden="true"></span></span>
          <div class="tl-toast__content">
            <div class="tl-toast__text">
              <div class="tl-toast__header">Message header</div>
              <div class="tl-toast__subheader">Short subheader</div>
            </div>
            <div class="tl-toast__actions">
              <a class="tl-link tl-link--underline" href="https://tegel.scania.com/home" target="_blank">Link example</a>
            </div>
          </div>
          <button class="tl-toast__close"><span class="tl-icon tl-icon--cross tl-icon--20" aria-hidden="true"></span></button>
        </div>

        <div class="tl-toast tl-toast--success">
          <span class="tl-toast__icon"><span class="tl-icon tl-icon--tick tl-icon--20" aria-hidden="true"></span></span>
          <div class="tl-toast__content">
            <div class="tl-toast__text">
              <div class="tl-toast__header">Message header</div>
              <div class="tl-toast__subheader">Short subheader</div>
            </div>
          </div>
          <button class="tl-toast__close"><span class="tl-icon tl-icon--cross tl-icon--20" aria-hidden="true"></span></button>
        </div>

        <div class="tl-toast tl-toast--warning">
          <span class="tl-toast__icon"><span class="tl-icon tl-icon--warning tl-icon--20" aria-hidden="true"></span></span>
          <div class="tl-toast__content">
            <div class="tl-toast__text">
              <div class="tl-toast__header">Message header</div>
              <div class="tl-toast__subheader">Short subheader</div>
            </div>
          </div>
          <button class="tl-toast__close"><span class="tl-icon tl-icon--cross tl-icon--20" aria-hidden="true"></span></button>
        </div>

        <div class="tl-toast tl-toast--error">
          <span class="tl-toast__icon"><span class="tl-icon tl-icon--error tl-icon--20" aria-hidden="true"></span></span>
          <div class="tl-toast__content">
            <div class="tl-toast__text">
              <div class="tl-toast__header">Message header</div>
              <div class="tl-toast__subheader">Short subheader</div>
            </div>
          </div>
          <button class="tl-toast__close"><span class="tl-icon tl-icon--cross tl-icon--20" aria-hidden="true"></span></button>
        </div>

      </div>

    </div>
  </body>
  <style>
      .tl-mode-dark {
        /* tds-grey-900 */
        background-color: #15181d;
      }

      .variant-wrapper {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .demo-wrapper {
        display: flex;
        flex-direction: row;
        gap: 24px;
      }
  </style>
</html>
