name: Playwright
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: packages/core
        run: npm ci

      - name: Build Tegel
        working-directory: packages/core
        run: npm run build

      - name: Verify CSS tokens in build output
        working-directory: packages/core
        run: |
          echo "=== Checking tegel.css for Figma token definitions ==="
          echo "component-chip tokens: $(grep -c 'component-chip-background-default' dist/tegel/tegel.css || echo 0)"
          echo "component-badge tokens: $(grep -c 'component-badge' dist/tegel/tegel.css || echo 0)"
          echo "component-spinner tokens: $(grep -c 'component-spinner' dist/tegel/tegel.css || echo 0)"
          echo "component-tag tokens: $(grep -c 'component-tag' dist/tegel/tegel.css || echo 0)"
          echo "scania primitive tokens: $(grep -c 'scania-color-grey-150' dist/tegel/tegel.css || echo 0)"
          echo "tds-chip vars: $(grep -c 'tds-chips-background' dist/tegel/tegel.css || echo 0)"
          echo "=== tegel.css file size ==="
          ls -lh dist/tegel/tegel.css
          if ! grep -q 'component-chip-background-default' dist/tegel/tegel.css; then
            echo "::error::CRITICAL: Figma component tokens missing from tegel.css - Sass compilation likely failed to resolve token imports"
            exit 1
          fi

      - name: Debug computed styles in Docker
        working-directory: packages/core
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/packages/core:/work/ \
            -w /work/ \
            mcr.microsoft.com/playwright:v1.56.1-jammy \
            /bin/bash -c '
              npx serve -p 3333 &
              sleep 2

              node -e "
              const { chromium } = require(\"playwright\");
              (async () => {
                const browser = await chromium.launch();
                const page = await browser.newPage();
                await page.goto(\"http://localhost:3333/src/components/chip/test/radio/index.html\");

                // Simulate setupPage: add brand and theme classes
                await page.evaluate(() => {
                  document.documentElement.classList.add(\"scania\");
                  document.body.classList.add(\"tds-mode-light\");
                  document.body.setAttribute(\"style\", \"background-color: white; padding: 20px;\");
                });

                // Wait a moment for styles to apply
                await page.waitForTimeout(1000);

                const debug = await page.evaluate(() => {
                  const html = document.documentElement;
                  const body = document.body;
                  const chip = document.querySelector(\"tds-chip\");
                  const label = chip ? chip.shadowRoot?.querySelector(\"label\") : null;

                  const getVars = (el) => {
                    if (!el) return \"element not found\";
                    const cs = getComputedStyle(el);
                    return {
                      // Figma primitive
                      \"--scania-color-grey-150\": cs.getPropertyValue(\"--scania-color-grey-150\").trim(),
                      // Figma semantic
                      \"--color-border-subtle\": cs.getPropertyValue(\"--color-border-subtle\").trim(),
                      // Component token
                      \"--component-chip-background-default\": cs.getPropertyValue(\"--component-chip-background-default\").trim(),
                      // Component var
                      \"--tds-chips-background\": cs.getPropertyValue(\"--tds-chips-background\").trim(),
                      \"--tds-chips-border\": cs.getPropertyValue(\"--tds-chips-border\").trim(),
                      \"--tds-chips-border-radius\": cs.getPropertyValue(\"--tds-chips-border-radius\").trim(),
                      // Computed
                      backgroundColor: cs.backgroundColor,
                      borderColor: cs.borderColor,
                    };
                  };

                  return {
                    htmlClasses: html.className,
                    bodyClasses: body.className,
                    chipExists: !!chip,
                    chipHasShadowRoot: !!chip?.shadowRoot,
                    labelExists: !!label,
                    stylesheetsLoaded: document.styleSheets.length,
                    stylesheetHrefs: Array.from(document.styleSheets).map(s => s.href || \"inline\"),
                    bodyVars: getVars(body),
                    chipVars: getVars(chip),
                    labelVars: getVars(label),
                  };
                });

                console.log(JSON.stringify(debug, null, 2));
                await browser.close();
              })().catch(e => { console.error(e); process.exit(1); });
              "

              kill %1 2>/dev/null || true
            '

      - name: Run Playwright tests in Docker
        working-directory: packages/core
        run: >
          docker run --rm --network host
          -v ${{ github.workspace }}/packages/core:/work/
          -w /work/
          mcr.microsoft.com/playwright:v1.56.1-jammy
          /bin/bash -c "npx playwright test"

      - uses: daun/playwright-report-summary@v3
        if: always()
        with:
          report-file: ./packages/core/results.json

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-output
          path: ./packages/core/test-results/output ## Folder used in playwright.config.js `outputDir`
          retention-days: 1
