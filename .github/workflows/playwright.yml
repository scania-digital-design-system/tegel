name: Playwright
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
jobs:
  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: packages/core
        run: npm ci

      - name: Build Tegel
        working-directory: packages/core
        run: npm run build

      - name: Verify CSS tokens in build output
        working-directory: packages/core
        run: |
          echo "=== Checking tegel.css for Figma token definitions ==="
          echo "component-chip tokens: $(grep -c 'component-chip-background-default' dist/tegel/tegel.css || echo 0)"
          echo "component-badge tokens: $(grep -c 'component-badge' dist/tegel/tegel.css || echo 0)"
          echo "component-spinner tokens: $(grep -c 'component-spinner' dist/tegel/tegel.css || echo 0)"
          echo "component-tag tokens: $(grep -c 'component-tag' dist/tegel/tegel.css || echo 0)"
          echo "scania primitive tokens: $(grep -c 'scania-color-grey-150' dist/tegel/tegel.css || echo 0)"
          echo "tds-chip vars: $(grep -c 'tds-chips-background' dist/tegel/tegel.css || echo 0)"
          echo "=== tegel.css file size ==="
          ls -lh dist/tegel/tegel.css
          if ! grep -q 'component-chip-background-default' dist/tegel/tegel.css; then
            echo "::error::CRITICAL: Figma component tokens missing from tegel.css - Sass compilation likely failed to resolve token imports"
            exit 1
          fi

      - name: Debug CSS loading in Docker
        working-directory: packages/core
        run: |
          docker run --rm --network host \
            -v ${{ github.workspace }}/packages/core:/work/ \
            -w /work/ \
            mcr.microsoft.com/playwright:v1.56.1-jammy \
            /bin/bash -c '
              echo "=== Start serve (default, with clean URLs) ==="
              npx serve -p 3334 &
              sleep 2

              echo "=== What HTML does serve return at the redirected URL? ==="
              echo "--- Direct index.html request (follows redirects): ---"
              curl -sL http://localhost:3334/src/components/chip/test/radio/index.html | head -15
              echo ""
              echo "--- Final URL after redirects: ---"
              curl -sL -o /dev/null -w "%{url_effective}\n" http://localhost:3334/src/components/chip/test/radio/index.html
              echo ""
              echo "--- CSS link resolution from final URL: ---"
              echo "From /src/components/chip/test/radio (no trailing slash):"
              echo "  ../../../../../dist/tegel/tegel.css resolves to what?"
              curl -sL -o /dev/null -w "CSS at resolved path: HTTP %{http_code}, %{size_download} bytes\n" http://localhost:3334/dist/tegel/tegel.css

              echo ""
              echo "=== Now test with --no-clean-urls ==="
              npx serve -p 3335 --no-clean-urls &
              sleep 2
              echo "--- index.html request (no clean URLs): ---"
              curl -s -o /dev/null -w "HTTP %{http_code}\n" http://localhost:3335/src/components/chip/test/radio/index.html
              curl -s http://localhost:3335/src/components/chip/test/radio/index.html | head -15

              kill %1 %2 2>/dev/null || true
            '

      - name: Run Playwright tests in Docker
        working-directory: packages/core
        run: >
          docker run --rm --network host
          -v ${{ github.workspace }}/packages/core:/work/
          -w /work/
          mcr.microsoft.com/playwright:v1.56.1-jammy
          /bin/bash -c "npx playwright test"

      - uses: daun/playwright-report-summary@v3
        if: always()
        with:
          report-file: ./packages/core/results.json

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-output
          path: ./packages/core/test-results/output ## Folder used in playwright.config.js `outputDir`
          retention-days: 1
